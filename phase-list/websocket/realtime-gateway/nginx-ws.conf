# nginx-ws.conf (Example Configuration)

http {
    # 1. Define the cluster of WebSocket servers
    upstream websocket_cluster {
        # 'ip_hash' ensures a client stays with the same server (Sticky Session)
        ip_hash; 

        server 127.0.0.1:8080;
        server 127.0.0.1:8081;
        server 127.0.0.1:8082;
    }

    server {
        listen 80;
        server_name gateway.example.com;

        location / {
            proxy_pass http://websocket_cluster;

            # 2. MANDATORY: Enable WebSocket Upgrade
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";

            # 3. Standard headers to pass the real User IP to our Node app
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # 4. Timeouts (Very important for WebSockets)
            # If no data flows for 60s, Nginx would normally kill the connection.
            # We set this high, but rely on our Node.js heartbeats to keep it alive.
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
    }
}
